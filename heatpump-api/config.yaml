name: Heatpump API
version: "0.1.6"
slug: heatpump_api
description: REST API proxy for heatpump web UI, enabling Home Assistant automation
url: "https://github.com/stefan-00/heatpump-api"
homeassistant: "2024.1.0"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ports:
  8765/tcp: 8765
options:
  heatpump_url: ""
  username: ""
  password: ""  # HPM access code (max 8 characters)
  port: 8765
  request_timeout: 15.0  # read/overall timeout (s) per HPM request; raise if device is slow
schema:
  heatpump_url: str
  username: str
  password: str
  port: int?
  request_timeout: float?
