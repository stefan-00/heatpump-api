# Heatpump API — Home Assistant package
#
# Copy this file to your HA config directory as packages/heatpump.yaml.
#
# Add to configuration.yaml:
#   homeassistant:
#     packages:
#       heatpump: !include packages/heatpump.yaml
#
# Add four entries to secrets.yaml pointing at your heatpump-api host
# (default port 8765):
#   heatpump_status_url        -> /api/v1/status
#   heatpump_hc1_sp_url        -> /api/v1/circuits/hc1/setpoints
#   heatpump_hc2_sp_url        -> /api/v1/circuits/hc2/setpoints
#   heatpump_hc2_flowlimit_url -> /api/v1/circuits/hc2/flow-limit

# ── Status & setpoint sensors ─────────────────────────────────────────────────

rest:
  # Status — 14 sensors from a single poll of /api/v1/status
  - resource: !secret heatpump_status_url
    scan_interval: 30
    timeout: 30
    sensor:
      - name: "Heatpump Operating Mode"
        unique_id: heatpump_operating_mode
        availability: "{{ value_json is defined and 'operating_mode' in value_json }}"
        value_template: "{{ value_json.operating_mode if 'operating_mode' in value_json else none }}"

      - name: "Heatpump Outdoor Temperature"
        unique_id: heatpump_outdoor_temp
        availability: "{{ value_json is defined and 'outdoor_temp' in value_json }}"
        value_template: "{{ value_json.outdoor_temp if 'outdoor_temp' in value_json else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "Heatpump Outlet Temperature"
        unique_id: heatpump_hp_outlet_temp
        availability: "{{ value_json is defined and 'heat_pump' in value_json }}"
        value_template: "{{ value_json.heat_pump.outlet_temp if 'heat_pump' in value_json else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "Heatpump Return Temperature"
        unique_id: heatpump_hp_return_temp
        availability: "{{ value_json is defined and 'heat_pump' in value_json }}"
        value_template: "{{ value_json.heat_pump.return_temp if 'heat_pump' in value_json else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "Heatpump Frequency"
        unique_id: heatpump_hp_frequency
        availability: "{{ value_json is defined and 'heat_pump' in value_json }}"
        value_template: "{{ value_json.heat_pump.frequency if 'heat_pump' in value_json else none }}"
        unit_of_measurement: "Hz"
        state_class: measurement

      - name: "Heatpump Error Code"
        unique_id: heatpump_hp_error_code
        availability: "{{ value_json is defined and 'heat_pump' in value_json }}"
        value_template: "{{ value_json.heat_pump.error_code if 'heat_pump' in value_json else none }}"

      - name: "HC1 Flow Setpoint"
        unique_id: heatpump_hc1_flow_setpoint
        availability: "{{ value_json is defined and 'heating_circuit_1' in value_json }}"
        value_template: "{{ value_json.heating_circuit_1.flow_setpoint if 'heating_circuit_1' in value_json else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC1 Flow Temperature"
        unique_id: heatpump_hc1_flow_temp
        availability: "{{ value_json is defined and 'heating_circuit_1' in value_json }}"
        value_template: "{{ value_json.heating_circuit_1.flow_temp if 'heating_circuit_1' in value_json else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC1 Room Setpoint"
        unique_id: heatpump_hc1_room_setpoint
        availability: "{{ value_json is defined and 'heating_circuit_1' in value_json }}"
        value_template: "{{ value_json.heating_circuit_1.room_setpoint if 'heating_circuit_1' in value_json else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      # HC2 (pool heating) status. heating_circuit_2 is best-effort in the API
      # and may be null; flow_setpoint/room_setpoint may also be null on their
      # own — both are guarded so the entity goes unavailable rather than erroring.
      - name: "HC2 Flow Setpoint"
        unique_id: heatpump_hc2_flow_setpoint
        availability: "{{ value_json is defined and value_json.heating_circuit_2 is defined and value_json.heating_circuit_2 is not none and value_json.heating_circuit_2.flow_setpoint is not none }}"
        value_template: "{{ value_json.heating_circuit_2.flow_setpoint if (value_json.heating_circuit_2 is defined and value_json.heating_circuit_2 is not none) else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC2 Flow Temperature"
        unique_id: heatpump_hc2_flow_temp
        availability: "{{ value_json is defined and value_json.heating_circuit_2 is defined and value_json.heating_circuit_2 is not none and value_json.heating_circuit_2.flow_temp is not none }}"
        value_template: "{{ value_json.heating_circuit_2.flow_temp if (value_json.heating_circuit_2 is defined and value_json.heating_circuit_2 is not none) else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC2 Room Setpoint"
        unique_id: heatpump_hc2_room_setpoint
        availability: "{{ value_json is defined and value_json.heating_circuit_2 is defined and value_json.heating_circuit_2 is not none and value_json.heating_circuit_2.room_setpoint is not none }}"
        value_template: "{{ value_json.heating_circuit_2.room_setpoint if (value_json.heating_circuit_2 is defined and value_json.heating_circuit_2 is not none) else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC2 Outdoor Temperature"
        unique_id: heatpump_hc2_outdoor_temp
        availability: "{{ value_json is defined and value_json.heating_circuit_2 is defined and value_json.heating_circuit_2 is not none and value_json.heating_circuit_2.outdoor_temp is not none }}"
        value_template: "{{ value_json.heating_circuit_2.outdoor_temp if (value_json.heating_circuit_2 is defined and value_json.heating_circuit_2 is not none) else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "DHW Setpoint"
        unique_id: heatpump_dhw_setpoint
        availability: "{{ value_json is defined and 'domestic_hot_water' in value_json }}"
        value_template: "{{ value_json.domestic_hot_water.setpoint if 'domestic_hot_water' in value_json else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "DHW Actual Temperature"
        unique_id: heatpump_dhw_actual_temp
        availability: "{{ value_json is defined and 'domestic_hot_water' in value_json }}"
        value_template: "{{ value_json.domestic_hot_water.actual_temp if 'domestic_hot_water' in value_json else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

    # On/off states — binary_sensor so history/InfluxDB record clean 0/1 values
    # (a string "True"/"False" sensor is not usefully graphable).
    binary_sensor:
      - name: "Heatpump On"
        unique_id: heatpump_hp_on
        availability: "{{ value_json is defined and 'heat_pump' in value_json }}"
        value_template: "{{ 'ON' if value_json.heat_pump.on else 'OFF' }}"
        device_class: running

      - name: "Heatpump Heating"
        unique_id: heatpump_hp_heating
        availability: "{{ value_json is defined and 'heat_pump' in value_json }}"
        value_template: "{{ 'ON' if value_json.heat_pump.heating else 'OFF' }}"
        device_class: heat

      - name: "HC1 Pump On"
        unique_id: heatpump_hc1_pump_on
        availability: "{{ value_json is defined and 'heating_circuit_1' in value_json }}"
        value_template: "{{ 'ON' if value_json.heating_circuit_1.pump_on else 'OFF' }}"
        device_class: running

  # HC1 setpoints — writable heating curve breakpoints + normal/standby
  #
  # roomOT1–roomOT4 are optional breakpoints; the availability template suppresses
  # "state is non-numeric" log errors when a breakpoint is not configured (API returns null).
  - resource: !secret heatpump_hc1_sp_url
    scan_interval: 60
    timeout: 30
    sensor:
      - name: "HC1 Setpoint roomOT1"
        unique_id: heatpump_hc1_sp_roomot1
        value_template: "{{ value_json.roomOT1 if value_json.roomOT1 is defined and value_json.roomOT1 is not none else none }}"
        availability: "{{ value_json is defined and value_json.roomOT1 is defined and value_json.roomOT1 is not none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC1 Setpoint roomOT2"
        unique_id: heatpump_hc1_sp_roomot2
        value_template: "{{ value_json.roomOT2 if value_json.roomOT2 is defined and value_json.roomOT2 is not none else none }}"
        availability: "{{ value_json is defined and value_json.roomOT2 is defined and value_json.roomOT2 is not none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC1 Setpoint roomOT3"
        unique_id: heatpump_hc1_sp_roomot3
        value_template: "{{ value_json.roomOT3 if value_json.roomOT3 is defined and value_json.roomOT3 is not none else none }}"
        availability: "{{ value_json is defined and value_json.roomOT3 is defined and value_json.roomOT3 is not none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC1 Setpoint roomOT4"
        unique_id: heatpump_hc1_sp_roomot4
        value_template: "{{ value_json.roomOT4 if value_json.roomOT4 is defined and value_json.roomOT4 is not none else none }}"
        availability: "{{ value_json is defined and value_json.roomOT4 is defined and value_json.roomOT4 is not none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC1 Setpoint roomNO"
        unique_id: heatpump_hc1_sp_roomno
        availability: "{{ value_json is defined and 'roomNO' in value_json }}"
        value_template: "{{ value_json.roomNO if 'roomNO' in value_json else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC1 Setpoint roomSNOT"
        unique_id: heatpump_hc1_sp_roomsnot
        availability: "{{ value_json is defined and 'roomSNOT' in value_json }}"
        value_template: "{{ value_json.roomSNOT if 'roomSNOT' in value_json else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

  # HC2 setpoints
  - resource: !secret heatpump_hc2_sp_url
    scan_interval: 60
    timeout: 30
    sensor:
      - name: "HC2 Setpoint roomOT1"
        unique_id: heatpump_hc2_sp_roomot1
        value_template: "{{ value_json.roomOT1 if value_json.roomOT1 is defined and value_json.roomOT1 is not none else none }}"
        availability: "{{ value_json is defined and value_json.roomOT1 is defined and value_json.roomOT1 is not none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC2 Setpoint roomOT2"
        unique_id: heatpump_hc2_sp_roomot2
        value_template: "{{ value_json.roomOT2 if value_json.roomOT2 is defined and value_json.roomOT2 is not none else none }}"
        availability: "{{ value_json is defined and value_json.roomOT2 is defined and value_json.roomOT2 is not none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC2 Setpoint roomOT3"
        unique_id: heatpump_hc2_sp_roomot3
        value_template: "{{ value_json.roomOT3 if value_json.roomOT3 is defined and value_json.roomOT3 is not none else none }}"
        availability: "{{ value_json is defined and value_json.roomOT3 is defined and value_json.roomOT3 is not none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC2 Setpoint roomOT4"
        unique_id: heatpump_hc2_sp_roomot4
        value_template: "{{ value_json.roomOT4 if value_json.roomOT4 is defined and value_json.roomOT4 is not none else none }}"
        availability: "{{ value_json is defined and value_json.roomOT4 is defined and value_json.roomOT4 is not none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC2 Setpoint roomNO"
        unique_id: heatpump_hc2_sp_roomno
        availability: "{{ value_json is defined and 'roomNO' in value_json }}"
        value_template: "{{ value_json.roomNO if 'roomNO' in value_json else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC2 Setpoint roomSNOT"
        unique_id: heatpump_hc2_sp_roomsnot
        availability: "{{ value_json is defined and 'roomSNOT' in value_json }}"
        value_template: "{{ value_json.roomSNOT if 'roomSNOT' in value_json else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

  # HC2 flow limit (pool heating floor) — /api/v1/circuits/hc2/flow-limit
  #
  # min_flow is the flow-temperature floor that lets HC2 demand heat regardless
  # of the weather curve / outdoor temperature; active reflects whether the
  # device limitation is enabled. Setting the floor (via the number below) both
  # writes min_flow and enables the limit in one call.
  - resource: !secret heatpump_hc2_flowlimit_url
    scan_interval: 300
    timeout: 30
    sensor:
      - name: "HC2 Flow Limit Min"
        unique_id: heatpump_hc2_flowlimit_min
        availability: "{{ value_json is defined and value_json.min_flow is defined and value_json.min_flow is not none }}"
        value_template: "{{ value_json.min_flow if (value_json is defined and value_json.min_flow is defined) else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

      - name: "HC2 Flow Limit Max"
        unique_id: heatpump_hc2_flowlimit_max
        availability: "{{ value_json is defined and value_json.max_flow is defined and value_json.max_flow is not none }}"
        value_template: "{{ value_json.max_flow if (value_json is defined and value_json.max_flow is defined) else none }}"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement

    binary_sensor:
      - name: "HC2 Flow Limit Active"
        unique_id: heatpump_hc2_flowlimit_active
        availability: "{{ value_json is defined and value_json.active is defined }}"
        value_template: "{{ 'ON' if value_json.active else 'OFF' }}"
        device_class: running

# ── REST commands (setpoint writes) ──────────────────────────────────────────

rest_command:
  # HC1
  heatpump_set_hc1_roomot1:
    url: !secret heatpump_hc1_sp_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"roomOT1": {{ value }}}'

  heatpump_set_hc1_roomot2:
    url: !secret heatpump_hc1_sp_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"roomOT2": {{ value }}}'

  heatpump_set_hc1_roomot3:
    url: !secret heatpump_hc1_sp_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"roomOT3": {{ value }}}'

  heatpump_set_hc1_roomot4:
    url: !secret heatpump_hc1_sp_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"roomOT4": {{ value }}}'

  heatpump_set_hc1_roomno:
    url: !secret heatpump_hc1_sp_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"roomNO": {{ value }}}'

  heatpump_set_hc1_roomsnot:
    url: !secret heatpump_hc1_sp_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"roomSNOT": {{ value }}}'

  # HC2
  heatpump_set_hc2_roomot1:
    url: !secret heatpump_hc2_sp_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"roomOT1": {{ value }}}'

  heatpump_set_hc2_roomot2:
    url: !secret heatpump_hc2_sp_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"roomOT2": {{ value }}}'

  heatpump_set_hc2_roomot3:
    url: !secret heatpump_hc2_sp_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"roomOT3": {{ value }}}'

  heatpump_set_hc2_roomot4:
    url: !secret heatpump_hc2_sp_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"roomOT4": {{ value }}}'

  heatpump_set_hc2_roomno:
    url: !secret heatpump_hc2_sp_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"roomNO": {{ value }}}'

  heatpump_set_hc2_roomsnot:
    url: !secret heatpump_hc2_sp_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"roomSNOT": {{ value }}}'

  # HC2 flow limit: writing flow_setpoint sets min_flow AND enables the limit
  # (the API manages max_flow > min_flow). One call, no separate toggle.
  heatpump_set_hc2_flow_limit:
    url: !secret heatpump_hc2_flowlimit_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"flow_setpoint": {{ value }}}'

  # Enable/disable the limitation without changing the floor.
  heatpump_enable_hc2_flow_limit:
    url: !secret heatpump_hc2_flowlimit_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"active": true}'

  heatpump_disable_hc2_flow_limit:
    url: !secret heatpump_hc2_flowlimit_url
    method: PATCH
    content_type: application/json
    timeout: 30
    payload: '{"active": false}'

# ── Template number entities (writable sliders) ───────────────────────────────

template:
  - number:
      # ── HC1 ──────────────────────────────────────────────────────────────
      - name: "HC1 Room OT1"
        unique_id: heatpump_hc1_num_roomot1
        availability: "{{ has_value('sensor.hc1_setpoint_roomot1') }}"
        state: "{{ states('sensor.hc1_setpoint_roomot1') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc1_roomot1
          data:
            value: "{{ value }}"

      - name: "HC1 Room OT2"
        unique_id: heatpump_hc1_num_roomot2
        availability: "{{ has_value('sensor.hc1_setpoint_roomot2') }}"
        state: "{{ states('sensor.hc1_setpoint_roomot2') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc1_roomot2
          data:
            value: "{{ value }}"

      - name: "HC1 Room OT3"
        unique_id: heatpump_hc1_num_roomot3
        availability: "{{ has_value('sensor.hc1_setpoint_roomot3') }}"
        state: "{{ states('sensor.hc1_setpoint_roomot3') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc1_roomot3
          data:
            value: "{{ value }}"

      - name: "HC1 Room OT4"
        unique_id: heatpump_hc1_num_roomot4
        availability: "{{ has_value('sensor.hc1_setpoint_roomot4') }}"
        state: "{{ states('sensor.hc1_setpoint_roomot4') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc1_roomot4
          data:
            value: "{{ value }}"

      - name: "HC1 Room Normal"
        unique_id: heatpump_hc1_num_roomno
        availability: "{{ has_value('sensor.hc1_setpoint_roomno') }}"
        state: "{{ states('sensor.hc1_setpoint_roomno') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc1_roomno
          data:
            value: "{{ value }}"

      - name: "HC1 Room Standby"
        unique_id: heatpump_hc1_num_roomsnot
        availability: "{{ has_value('sensor.hc1_setpoint_roomsnot') }}"
        state: "{{ states('sensor.hc1_setpoint_roomsnot') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc1_roomsnot
          data:
            value: "{{ value }}"

      # ── HC2 ──────────────────────────────────────────────────────────────
      - name: "HC2 Room OT1"
        unique_id: heatpump_hc2_num_roomot1
        availability: "{{ has_value('sensor.hc2_setpoint_roomot1') }}"
        state: "{{ states('sensor.hc2_setpoint_roomot1') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc2_roomot1
          data:
            value: "{{ value }}"

      - name: "HC2 Room OT2"
        unique_id: heatpump_hc2_num_roomot2
        availability: "{{ has_value('sensor.hc2_setpoint_roomot2') }}"
        state: "{{ states('sensor.hc2_setpoint_roomot2') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc2_roomot2
          data:
            value: "{{ value }}"

      - name: "HC2 Room OT3"
        unique_id: heatpump_hc2_num_roomot3
        availability: "{{ has_value('sensor.hc2_setpoint_roomot3') }}"
        state: "{{ states('sensor.hc2_setpoint_roomot3') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc2_roomot3
          data:
            value: "{{ value }}"

      - name: "HC2 Room OT4"
        unique_id: heatpump_hc2_num_roomot4
        availability: "{{ has_value('sensor.hc2_setpoint_roomot4') }}"
        state: "{{ states('sensor.hc2_setpoint_roomot4') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc2_roomot4
          data:
            value: "{{ value }}"

      - name: "HC2 Room Normal"
        unique_id: heatpump_hc2_num_roomno
        availability: "{{ has_value('sensor.hc2_setpoint_roomno') }}"
        state: "{{ states('sensor.hc2_setpoint_roomno') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc2_roomno
          data:
            value: "{{ value }}"

      - name: "HC2 Room Standby"
        unique_id: heatpump_hc2_num_roomsnot
        availability: "{{ has_value('sensor.hc2_setpoint_roomsnot') }}"
        state: "{{ states('sensor.hc2_setpoint_roomsnot') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc2_roomsnot
          data:
            value: "{{ value }}"

      # Pool flow floor. Setting this writes min_flow and enables the device
      # flow limitation so HC2 heats the pool regardless of outdoor temp.
      # State reflects the confirmed min_flow; see binary_sensor.hc2_flow_limit_active
      # for whether the limit is currently on.
      - name: "HC2 Pool Flow Setpoint"
        unique_id: heatpump_hc2_num_flow_limit
        availability: "{{ has_value('sensor.hc2_flow_limit_min') }}"
        state: "{{ states('sensor.hc2_flow_limit_min') }}"
        min: 2
        max: 50
        step: 0.5
        unit_of_measurement: "°C"
        set_value:
          action: rest_command.heatpump_set_hc2_flow_limit
          data:
            value: "{{ value }}"

  # ── Switch: enable/disable the HC2 flow limitation ──────────────────────────
  - switch:
      - name: "HC2 Flow Limit"
        unique_id: heatpump_hc2_flow_limit_switch
        availability: "{{ has_value('binary_sensor.hc2_flow_limit_active') }}"
        state: "{{ is_state('binary_sensor.hc2_flow_limit_active', 'on') }}"
        turn_on:
          action: rest_command.heatpump_enable_hc2_flow_limit
        turn_off:
          action: rest_command.heatpump_disable_hc2_flow_limit
