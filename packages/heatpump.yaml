      - name: "HC2 Room OT2"
        unique_id: heatpump_hc2_num_roomot2
        availability: "{{ has_value('sensor.hc2_setpoint_roomot2') }}"
        state: "{{ states('sensor.hc2_setpoint_roomot2') }}"
        min: 2
